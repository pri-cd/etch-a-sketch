<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="./assets/styles.css">
    <script src="./assets/script.js" defer></script>
</head>

<body>
    <div class="header">
        <div id="logo" class="logo"><img src="./assets/files/logo.png" alt="A hand drawing a sketch"></div>

        <div id="sizeChangePrompt" class="sizeChangePrompt">

    </div>

    <div class="mainContainer">
    </div>

    <div class="footer">
        <div class="attribution">Logo used from flaticon.</div>
    </div>

</html>
